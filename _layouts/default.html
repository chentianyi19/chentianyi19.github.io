<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic Page Needs -->
  <meta charset="utf-8">
  <title>Tianyi Chen | {{ page.title }}</title>
  <meta name="description" content="Tianyi Chen">
  <meta name="author" content="Tianyi Chen">
  <meta property="og:title" content="Tianyi Chen" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://chentianyi19.github.io" />
  <meta property="og:site_name" content="Tianyi Chen" />
  <link rel="canonical" href="https://chentianyi19.github.io" />

  <!-- Mobile Specific Metas -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css?family=Raleway:400,300,600" rel="stylesheet" type="text/css">

  <!-- CSS -->
  <link rel="stylesheet" href="{{ "/libs/external/skeleton/normalize.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="{{ "/libs/external/skeleton/skeleton.css" | prepend: site.baseurl }}">
  <link rel="stylesheet" href="{{ "/libs/custom/my_css.css" | prepend: site.baseurl }}">

  <!-- JQuery -->
  <script src="{{ "/libs/external/jquery-3.1.1.min.js" | prepend: site.baseurl }}"></script>

  <!-- Font-Awesome -->
  <link rel="stylesheet" href="{{ "/libs/external/fontawesome-free-6.6.0-web/css/all.min.css" | prepend: site.baseurl }}">

  <!-- Academicons -->
  <link rel="stylesheet" href="{{ "/libs/external/academicons-1.8.6/css/academicons.min.css" | prepend: site.baseurl }}">

  <!-- Skeleton tabs -->
  <link rel="stylesheet" href="{{ "/libs/external/skeleton_tabs/skeleton-tabs.css" | prepend: site.baseurl }}">
  <script src="{{ "/libs/external/skeleton_tabs/skeleton-tabs.js" | prepend: site.baseurl }}"></script>

  <!-- Timeline -->
  <link rel="stylesheet" href="{{ "/libs/external/timeline.css" | prepend: site.baseurl }}">

  <!-- Custom Scripts -->
  <script src="{{ "/libs/custom/my_js.js" | prepend: site.baseurl }}"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{{ "/libs/icon.png" | prepend: site.baseurl }}">
  <link rel="shortcut icon" type="image/png" href="{{ "/libs/icon.png" | prepend: site.baseurl }}">

</head>
<body>

  <!-- Primary Page Layout -->
  <div class="container">

    <section class="header">
      <div class="row">
        <div class="three columns">
          <a href="{{ site.baseurl }}/">
            <img class="u-max-full-width" src="{{ site.baseurl }}{{ site.data.main_info.profile_pic }}" alt="Profile Picture">
          </a>
        </div>
        <div class="nine columns main-description">
          <h1>Tianyi Chen</h1>
          <p>Professor at Rensselaer Polytechnic Institute</p>
          <p>Email: tianyi.chen@example.com</p>
          <p>
            <span onclick="window.open('https://bsky.social/tianyi')" style="cursor: pointer">
              <i class="fa-brands fa-bluesky" style="padding-top: 10px"></i>
            </span>
            <span onclick="window.open('https://twitter.com/tianyi')" style="cursor: pointer">
              <i class="fa-brands fa-twitter fa-lg"></i>
            </span>
            <span onclick="window.open('https://linkedin.com/in/tianyi')" style="cursor: pointer">
              <i class="fa-brands fa-linkedin fa-lg"></i>
            </span>
            <span onclick="window.open('https://github.com/chentianyi19')" style="cursor: pointer">
              <i class="fa-brands fa-github fa-lg"></i>
            </span>
            <span onclick="window.open('https://scholar.google.com/citations?user=abcd1234')" style="cursor: pointer">
              <i class="ai ai-google-scholar ai-lg" aria-hidden="true"></i>
            </span>
          </p>
        </div>
      </div>
    </section>

    <div class="navbar-spacer"></div>
    <nav class="navbar">
      <div class="container">
        <ul class="navbar-list">
          <li class="navbar-item"><a class="navbar-link" href="{{ "/index.html#bio" | prepend: site.baseurl }}">Bio</a></li>
          <li class="navbar-item"><a class="navbar-link" href="{{ "/index.html#prospective-students" | prepend: site.baseurl }}">Prospective Students</a></li>
          <li class="navbar-item"><a class="navbar-link" href="{{ "/index.html#publications" | prepend: site.baseurl }}">Publications</a></li>
        </ul>
      </div>
    </nav>

    {{ content }}

    <div class="footer">
      <div class="row">
        <div class="four columns">
          Tianyi Chen
        </div>
        <div class="four columns">
          Email: tianyi.chen@example.com
        </div>
        <div class="four columns">
          <span onclick="window.open('https://bsky.social/tianyi')" style="cursor: pointer">
            <i class="fa-brands fa-bluesky fa-sm" style="padding-top: 10px"></i>
          </span>
          <span onclick="window.open('https://twitter.com/tianyi')" style="cursor: pointer">
            <i class="fa-brands fa-twitter"></i>
          </span>
          <span onclick="window.open('https://linkedin.com/in/tianyi')" style="cursor: pointer">
            <i class="fa-brands fa-linkedin"></i>
          </span>
          <span onclick="window.open('https://github.com/chentianyi19')" style="cursor: pointer">
            <i class="fa-brands fa-github"></i>
          </span>
          <span onclick="window.open('https://scholar.google.com/citations?user=abcd1234')" style="cursor: pointer">
            <i class="ai ai-google-scholar" aria-hidden="true"></i>
          </span>
        </div>
      </div>
    </div>
  </div>

  <!-- Google Analytics -->
  {% include google_analytics.html %}

</body>
</html>
