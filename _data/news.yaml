news_items:

  - item: "Our early work back to 2020 on <a href="https://ieeexplore.ieee.org/abstract/document/9153949">Byzantine-resilient federated learning</a> has been honored with the <b>IEEE Signal Processing Society Young Author Best Paper Award</b>! Thrilled to see my final contribution as a young author receive this recognition"
    date: "Dec 2024"
    link: "https://signalprocessingsociety.org/community-involvement/awards-submit-award-nomination#youngauthor"

  - item: "Our extended study of the <a href="https://proceedings.mlr.press/v202/shen23c/shen23c.pdf">ICML 2023</a> paper on the penalty-based bilevel optimization methods has been accepted to <a href="https://link.springer.com/journal/10107"><b>Mathematical Programming</b></a> Series A (final version is coming): On Penalty-based Bilevel Gradient Descent Method"
    date: "Dec 2024"
    link: "https://arxiv.org/pdf/2302.05185"

  - item: "I am <b>honored to be invited to</b> <a href="https://coral.ise.lehigh.edu/paow/"><b>Portuguese American Optimization Workshop</b></a> (PAOW), colocated with <a href="https://coral.ise.lehigh.edu/mopta2025/">MOPTA 2025</a>"
    link: "https://coral.ise.lehigh.edu/paow/"
    date: "Nov 2024"

  - item: "I am invited to present our work at The FIND Seminar, Cornell University"
    link: "https://find.engineering.cornell.edu/seminar/"
    date: "Sep 2024"
