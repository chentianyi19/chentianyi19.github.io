news_items:

  - item: "Our early work back to 2020 on Byzantine-resilient federated learning has been honored with the <b>IEEE Signal Processing Society Young Author Best Paper Award</b>! Thrilled to see my final contribution as a young author receive this recognition"
    date: "Dec 2024"
    link: "https://signalprocessingsociety.org/community-involvement/awards-submit-award-nomination#youngauthor"

  - item: "Our extended study of the ICML 2023 paper on the penalty-based bilevel optimization methods has been accepted to <b>Mathematical Programming</b> Series A (the final version is coming): On Penalty-based Bilevel Gradient Descent Method"
    date: "Dec 2024"
    link: "https://arxiv.org/pdf/2302.05185"

  - item: "I am honored to be invited to <b>Portuguese American Optimization Workshop</b> (PAOW), colocated with MOPTA 2025"
    link: "https://coral.ise.lehigh.edu/paow/"
    date: "Nov 2024"

  - item: "I am invited to present our work at The FIND Seminar, Cornell University"
    link: "https://find.engineering.cornell.edu/seminar/"
    date: "Sep 2024"
