news_items:

  - item: "Our early work back to 2020 on Byzantine-resilient federated learning has been honored with the <b>IEEE Signal Processing Society Young Author Best Paper Award</b>! Thrilled to see my final contribution as a young author receive this recognition"
    date: "Dec 2024"
    link: "https://signalprocessingsociety.org/community-involvement/awards-submit-award-nomination#youngauthor"
    selected: y

